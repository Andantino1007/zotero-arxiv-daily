zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["Solid Mechanics/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: https://api.chatanywhere.tech/v1
  generation_kwargs:
    model: gpt-4o-mini
    max_tokens: 12000
  language: Chinese

reranker:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: https://api.chatanywhere.tech/v1
    model: text-embedding-ada-002
    batch_size: 64

source:
  arxiv:
    category:
      - physics.comp-ph
      - physics.app-ph
      - cond-mat.mtrl-sci
      - cond-mat.soft
      - math.NA
      - cs.CE
      - cs.LG
      - cs.AI
    include_cross_list: true
    extract_full_text: false
    keywords:
      # Neural operators / operator learning for solid and multiphysics mechanics
      - neural operator
      - operator learning
      - Fourier neural operator
      - DeepONet
      - finite element neural operator
      - finite element-guided
      - physics-informed operator learning
      - thermomechanical operator learning
      - thermo-mechanical operator learning
      - boundary-to-domain mapping

      # LLM and AI-agent workflows for finite element / structural analysis
      - large language model
      - LLM
      - AI agent
      - AI-agent
      - multi-agent
      - finite element analysis
      - automated structural analysis
      - AbaqusAgent
      - Abaqus
      - OpenSees
      - OpenSeesPy
      - structural modeling

      # Generative design for microstructures, metamaterials, and mechanical properties
      - diffusion model
      - generative model
      - inverse design
      - mechanical metamaterial
      - metamaterial design
      - microstructure generation
      - microstructure design
      - mechanical properties
      - stress-strain
      - signed distance function
      - property conditioning

      # Physics-informed neural networks for solid, fracture, and inverse mechanics
      - physics-informed neural network
      - physics-informed machine learning
      - PINN
      - Finite-PINN
      - fracture mechanics
      - inverse problem
      - Kolosov-Muskhelishvili
      - extended physics-informed neural network
    exclude_keywords:
      - interatomic potential
      - atomic potential
      - atomistic potential
      - universal interatomic potential
      - machine learning interatomic potential
      - neural network potential
      - MLIP
      - ML-IAP

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']
  reranker: api
  max_paper_num: 20
