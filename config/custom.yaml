zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["Solid Mechanics/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: https://api.chatanywhere.tech/v1
  generation_kwargs:
    model: gpt-4o-mini
    max_tokens: 12000
  language: Chinese

reranker:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: https://api.chatanywhere.tech/v1
    model: text-embedding-ada-002
    batch_size: 64

source:
  arxiv:
    category:
      - physics.comp-ph
      - physics.app-ph
      - cond-mat.mtrl-sci
      - cond-mat.soft
      - math.NA
      - cs.CE
      - cs.LG
      - cs.AI
    include_cross_list: true
    extract_full_text: false
    strong_keywords:
      # Specific SciML/PDE methods that transfer well to solid mechanics.
      - neural operator
      - Fourier neural operator
      - DeepONet
      - finite element neural operator
      - physics-informed operator learning
      - physics-informed surrogate
      - differentiable simulation
      - differentiable physics
      - neural PDE
      - PDE surrogate
      - surrogate model for PDE
    keywords:
      # Broad AI terms below still need one mechanics anchor from required_keywords.
      - operator learning
      - physics-informed neural network
      - physics-informed machine learning
      - PINN
      - scientific machine learning
      - reduced-order neural
      - large language model
      - LLM
      - AI agent
      - AI-agent
      - multi-agent
      - AbaqusAgent
      - OpenSeesPy agent
      - automated structural analysis
      - diffusion model
      - generative model
      - inverse design
      - property conditioning
      - conditional generation
      - foundation model
    required_keywords:
      # Mechanics anchors for broad AI terms.
      - solid mechanics
      - computational mechanics
      - continuum mechanics
      - finite element
      - finite element analysis
      - structural analysis
      - structural modeling
      - elasticity
      - hyperelasticity
      - elastodynamics
      - fracture mechanics
      - crack propagation
      - thermomechanical
      - thermo-mechanical
      - multiphysics
      - metamaterial
      - mechanical metamaterial
      - microstructure
      - mechanical properties
      - stress-strain
      - boundary-to-domain
      - elastic displacement
      - linear elastic
      - Abaqus
      - OpenSees
      - OpenSeesPy
    exclude_keywords:
      - interatomic potential
      - atomic potential
      - atomistic potential
      - universal interatomic potential
      - machine learning interatomic potential
      - neural network potential
      - MLIP
      - ML-IAP
      - fluid flow
      - Navier-Stokes
      - turbulence
      - quantum
      - finance
      - financial
      - crypto
      - liquidity

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']
  reranker: api
  max_paper_num: 20
